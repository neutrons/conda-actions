name: Test pkg-verify action

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ["v*"]

env:
  PKG_NAME: quicknxs

jobs:
  test:
    name: Test pkg-verify action
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify conda package
        uses: neutrons/conda-actions/pkg-verify@main
        with:
          # local-channel: /tmp/local-channel
          package-name: ${{ env.PKG_NAME }}
          extra-channels: neutrons mantid
          extra-commands: |
            echo "This is a test of a multiline"
            output=$(date)
            echo "${output}"

  test-with-module-name:
    name: Test pkg-verify action with module name
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify conda package
        uses: neutrons/conda-actions/pkg-verify@main
        with:
          # local-channel: /tmp/local-channel
          package-name: ${{ env.PKG_NAME }}
          module-name: ${{ env.PKG_NAME }}
          extra-channels: neutrons mantid
