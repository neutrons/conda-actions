name: conda-publish
description: Upload a pre-built conda package to Anaconda Cloud
author: glass-ships
branding:
  icon: upload-cloud
  color: green

inputs:
  anaconda-token:
    description: Anaconda.org API token (store as a repository/org secret)
    required: true
  organization:
    description: Anaconda.org organization or user name to publish under
    required: true
  package-path:
    description: Path to the .conda file to upload.
    required: true
  github-ref:
    description: |
      GitHub ref (branch, tag, or commit) to include in the package metadata.
      Defaults to the current ref of the workflow run.
    required: false
    default: ${{ github.ref }}
  label:
    description: |
      Anaconda channel label to publish to (e.g. main, dev, nightly, rc).
      Defaults to "main".
    required: false
    default: ""
  force:
    description: |
      If true, overwrite an existing package file with the same name/version.
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Check for anaconda and pixi commands
      id: get_command
      shell: bash
      run: |
        if command -v anaconda &>/dev/null; then
            echo "'anaconda' command is available. Using it for upload."
            echo "CMD=anaconda" >> $GITHUB_OUTPUT
        elif pixi run anaconda --version &>/dev/null; then
            echo "anaconda command is available via pixi. Using 'pixi run anaconda' for upload."
            echo "CMD='pixi run anaconda'" >> $GITHUB_OUTPUT
        else
            echo "Checking for 'pixi' command..."
            if command -v pixi &>/dev/null; then
                echo "'pixi' command is available but 'anaconda' is not found. Installing anaconda-client..."
                pixi global install anaconda-client
                echo "Using 'pixi run anaconda' for upload after installation."
                echo "CMD='pixi run anaconda'" >> $GITHUB_OUTPUT
            else
                echo "Neither 'anaconda' command nor 'pixi' is available. Please ensure that anaconda-client is installed and available in PATH or via pixi."
                exit 1
            fi
        fi

    - name: Upload package to Anaconda Cloud
      shell: bash
      env:
        ANACONDA_API_TOKEN: ${{ inputs.anaconda-token }}
        ORGANIZATION: ${{ inputs.organization }}
        PACKAGE_PATH: ${{ inputs.package-path }}
        REF: ${{ inputs.github-ref }}
        LABEL: ${{ inputs.label }}
        FORCE: ${{ inputs.force }}
      run: |
        set -euo pipefail

        set CMD=${{ steps.get_command.outputs.CMD }}

        if [ "${LABEL}" = "" ]; then
          echo "No label input provided. Determining label from GitHub ref '${REF}'..."
          case "${REF}" in
            refs/heads/next)  LABEL="dev" ;;
            refs/tags/v*rc*)  LABEL="rc" ;;
            refs/tags/v*)     LABEL="main" ;;
            *)
              echo "Could not determine label from ref '${REF}'. Please provide a label input or use a ref format like 'refs/heads/next' or 'refs/tags/vX.Y.Z[rcN]'."
              exit 1
              ;;
          esac
        fi
        echo "Using label '${LABEL}' for upload."

        force_flag=""
        if [ "${FORCE}" = "true" ]; then
          force_flag="--force"
        fi

        echo "Uploading ${PACKAGE_PATH} to ${ORGANIZATION} with label '${LABEL}'"
        ${CMD} \
          --token "${ANACONDA_API_TOKEN}" \
          upload \
          --user "${ORGANIZATION}" \
          --label "${LABEL}" \
          ${force_flag} \
          ${{ inputs.package-path }}

        echo "Upload complete."
