name: conda-publish
description: Upload a pre-built conda package to Anaconda Cloud
author: glass-ships
branding:
  icon: upload-cloud
  color: green

inputs:
  anaconda-token:
    description: Anaconda.org API token (store as a repository/org secret)
    required: true
  organization:
    description: Anaconda.org organization or user name to publish under
    required: true
  package-path:
    description: Path to the .conda file to upload.
    required: true
  github-ref:
    description: |
      GitHub ref (branch, tag, or commit) to include in the package metadata.
      Defaults to the current ref of the workflow run.
    required: false
    default: ${{ github.ref }}
  label:
    description: |
      Anaconda channel label to publish to (e.g. main, dev, nightly, rc).
      Defaults to "main".
    required: false
    default: ""
  force:
    description: |
      If true, overwrite an existing package file with the same name/version.
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Check for anaconda and pixi commands
      shell: bash
      run: |
        if ! command -v anaconda &> /dev/null; then
          if ! command -v pixi &> /dev/null; then
            echo "Error: Neither 'anaconda' nor 'pixi' command found. Please install the Anaconda Client or Pixi CLI to use this action."
            exit 1
          else
            echo "'pixi' command found. Installing anaconda-client via pixi..."
            pixi global install anaconda-client
          fi
        fi

    - name: Upload package to Anaconda Cloud
      shell: bash
      env:
        ANACONDA_API_TOKEN: ${{ inputs.anaconda-token }}
        ORGANIZATION: ${{ inputs.organization }}
        PACKAGE_PATH: ${{ inputs.package-path }}
        REF: ${{ inputs.github-ref }}
        LABEL: ${{ inputs.label }}
        FORCE: ${{ inputs.force }}
      run: |
        set -euo pipefail

        if [ "${LABEL}" = "" ]; then
          echo "No label input provided. Determining label from GitHub ref '${REF}'..."
          case "${REF}" in
            refs/heads/next)  LABEL="dev" ;;
            refs/tags/v*rc*)  LABEL="rc" ;;
            refs/tags/v*)     LABEL="main" ;;
            *)
              echo "Could not determine label from ref '${REF}'. Please provide a label input or use a ref format like 'refs/heads/next' or 'refs/tags/vX.Y.Z[rcN]'."
              exit 1
              ;;
          esac
        fi
        echo "Using label '${LABEL}' for upload."

        force_flag=""
        if [ "${FORCE}" = "true" ]; then
          force_flag="--force"
        fi

        echo "Uploading ${PACKAGE_PATH} to ${ORGANIZATION} with label '${LABEL}'"
        anaconda \
          --token "${ANACONDA_API_TOKEN}" \
          upload \
          --user "${ORGANIZATION}" \
          --label "${LABEL}" \
          ${force_flag} \
          ${PACKAGE_PATH}

        echo "Upload complete."
